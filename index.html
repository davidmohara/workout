<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Workout">
<meta name="theme-color" content="#1a73e8">
<link rel="manifest" href="manifest.json">
<title>Workout</title>
<style>
:root {
  --bl: #1a73e8; --bll: #e8f0fe; --bld: #1557b0;
  --gr: #1e8e3e; --grl: #e6f4ea;
  --am: #e37400; --aml: #fef3e2;
  --pu: #7c3aed; --pul: #ede9fe;
  --rd: #d93025; --rdl: #fce8e6;
  --g1: #202124; --g2: #3c4043; --g3: #5f6368;
  --g4: #9aa0a6; --g5: #dadce0; --g6: #f1f3f4; --g7: #f8f9fa;
  --wh: #ffffff; --ra: 12px;
  --st: env(safe-area-inset-top, 0px);
  --sb: env(safe-area-inset-bottom, 16px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; background: var(--g7); font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; color: var(--g1); }

/* NAV */
.nav { display: flex; background: var(--wh); border-bottom: 1px solid var(--g5); position: fixed; top: 0; left: 0; right: 0; z-index: 100; padding-top: var(--st); }
.nt { flex: 1; padding: 10px 2px 8px; text-align: center; font-size: 10px; color: var(--g4); border: none; background: none; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 3px; }
.nt svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
.nt.on { color: var(--bl); }

/* SCREENS */
.sc { display: none; position: fixed; top: 52px; left: 0; right: 0; bottom: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 12px 12px calc(12px + var(--sb)); }
.sc.on { display: block; }
::-webkit-scrollbar { display: none; }

/* CARDS */
.card { background: var(--wh); border-radius: var(--ra); margin-bottom: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.08); overflow: hidden; }
.card-pad { padding: 14px 16px; }

/* WEEK SCREEN */
.week-header { padding: 4px 0 12px; }
.week-title { font-size: 20px; font-weight: 700; }
.week-sub { font-size: 13px; color: var(--g3); margin-top: 2px; }
.wday-card { background: var(--wh); border-radius: var(--ra); margin-bottom: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.08); overflow: hidden; cursor: pointer; }
.wday-card.done-wk { opacity: .6; }
.wday-card.active-wk { border: 2px solid var(--bl); }
.wday-head { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; }
.wday-left { flex: 1; }
.wday-name { font-size: 16px; font-weight: 600; }
.wday-date { font-size: 13px; color: var(--g3); margin-top: 2px; }
.wday-excount { font-size: 12px; color: var(--g4); margin-top: 3px; }
.wday-badge { font-size: 12px; padding: 4px 10px; border-radius: 20px; font-weight: 500; white-space: nowrap; margin-left: 8px; }
.wday-status { display: flex; align-items: center; gap: 8px; }
.status-dot { width: 10px; height: 10px; border-radius: 50%; }
.dot-done { background: var(--gr); }
.dot-today { background: var(--bl); }
.dot-upcoming { background: var(--g5); }
.wday-summary { padding: 0 16px 12px; font-size: 13px; color: var(--g3); }
.wday-btn { display: block; margin: 0 16px 14px; padding: 10px; border-radius: 8px; border: none; font-size: 14px; font-weight: 600; cursor: pointer; background: var(--bl); color: var(--wh); text-align: center; width: calc(100% - 32px); }
.week-summary-card { background: var(--grl); border-radius: var(--ra); padding: 14px 16px; margin-bottom: 10px; }
.week-summary-title { font-size: 14px; font-weight: 600; color: var(--gr); }
.week-summary-sub { font-size: 13px; color: var(--g2); margin-top: 4px; }

/* WORKOUT SCREEN */
.day-header { background: var(--wh); border-radius: var(--ra); padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
.day-title { font-size: 17px; font-weight: 600; }
.day-sub { font-size: 13px; color: var(--g3); margin-top: 2px; }
.day-badge { font-size: 12px; padding: 4px 10px; border-radius: 20px; font-weight: 500; white-space: nowrap; }
.bs { background: var(--bll); color: var(--bl); }
.bh { background: var(--grl); color: var(--gr); }
.bm { background: var(--aml); color: var(--am); }
.bk { background: var(--pul); color: var(--pu); }
.nub { background: var(--g1); color: var(--wh); border-radius: var(--ra); padding: 10px 14px; margin-bottom: 10px; font-size: 13px; }
.nub strong { font-size: 14px; }

/* EXERCISE CARD */
.ec { background: var(--wh); border-radius: var(--ra); margin-bottom: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.08); overflow: hidden; }
.ec.dc { opacity: .5; }
.ec.nc { border-left: 3px solid var(--pu); }
.ech { display: flex; align-items: center; gap: 12px; padding: 14px 14px 0; }
.ei { width: 48px; height: 48px; border-radius: 8px; background: var(--g6); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 22px; }
.einfo { flex: 1; min-width: 0; }
.en { font-size: 15px; font-weight: 600; line-height: 1.2; }
.em { font-size: 13px; color: var(--g3); margin-top: 3px; }
.etags { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 5px; }
.etag { font-size: 11px; padding: 2px 7px; border-radius: 20px; background: var(--g6); color: var(--g3); }
.newtag { background: var(--pul); color: var(--pu); }
.edesc { font-size: 13px; color: var(--g2); line-height: 1.5; padding: 10px 14px; border-top: 1px solid var(--g6); margin-top: 10px; }
.emuscles { font-size: 12px; color: var(--g3); padding: 0 14px 6px; }
.emuscles span { font-weight: 500; color: var(--g2); }
.etip { font-size: 12px; background: var(--bll); color: var(--bld); border-radius: 6px; padding: 7px 10px; margin: 0 14px 10px; line-height: 1.4; }

/* SET TRACKER */
.settrack { padding: 8px 14px 12px; border-top: 1px solid var(--g6); }
.setlbl { font-size: 11px; color: var(--g3); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
.setrows { display: flex; flex-direction: column; gap: 6px; }
.setrow { display: flex; align-items: center; gap: 6px; }
.setnum { font-size: 13px; color: var(--g3); width: 34px; flex-shrink: 0; }
.setin { flex: 1; height: 36px; border: 1px solid var(--g5); border-radius: 8px; text-align: center; font-size: 15px; background: var(--g7); color: var(--g1); min-width: 0; }
.setin:focus { outline: none; border-color: var(--bl); background: var(--wh); }
.setx { font-size: 13px; color: var(--g4); flex-shrink: 0; }
.setchk { width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid var(--g5); background: var(--wh); display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }
.setchk.on { background: var(--gr); border-color: var(--gr); }
.setchk svg { width: 16px; height: 16px; stroke: var(--g5); stroke-width: 2.5; fill: none; }
.setchk.on svg { stroke: var(--wh); }

/* RPE */
.rpe-row { display: flex; align-items: center; gap: 8px; padding: 10px 14px 14px; border-top: 1px solid var(--g6); }
.rpe-lbl { font-size: 13px; color: var(--g3); flex-shrink: 0; }
.rpe-btns { display: flex; gap: 4px; flex-wrap: wrap; }
.rpeb { width: 30px; height: 30px; border-radius: 6px; border: 1px solid var(--g5); background: var(--g7); font-size: 13px; font-weight: 500; color: var(--g3); cursor: pointer; display: flex; align-items: center; justify-content: center; }
.rpeb.on { background: var(--bl); border-color: var(--bl); color: var(--wh); }

/* BUTTONS */
.dnbtn { display: block; margin: 6px 14px 12px; width: calc(100% - 28px); padding: 11px; border-radius: 8px; border: none; font-size: 15px; font-weight: 600; cursor: pointer; background: var(--bl); color: var(--wh); }
.bigbtn { display: block; width: 100%; padding: 14px; border-radius: var(--ra); border: none; font-size: 16px; font-weight: 600; cursor: pointer; background: var(--bl); color: var(--wh); margin-bottom: 10px; text-align: center; }
.bigbtn.sec { background: var(--g5); color: var(--g1); }
.bigbtn.grn { background: var(--gr); }

/* REST */
.restbar { background: var(--bll); border-radius: 8px; margin: 0 14px 12px; padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; }
.restlbl { font-size: 13px; color: var(--bl); font-weight: 500; }
.resttimer { font-size: 20px; font-weight: 700; color: var(--bl); font-variant-numeric: tabular-nums; }
.restskip { font-size: 13px; color: var(--bl); background: none; border: none; cursor: pointer; }

/* COMPLETE */
.completebanner { background: var(--gr); color: var(--wh); border-radius: var(--ra); padding: 18px; text-align: center; margin-bottom: 10px; }
.completebanner h2 { font-size: 22px; font-weight: 700; }
.completebanner p { font-size: 14px; opacity: .9; margin-top: 4px; }
.saving-indicator { text-align: center; font-size: 13px; color: var(--g3); padding: 8px; }

/* HISTORY */
.hcard { background: var(--wh); border-radius: var(--ra); margin-bottom: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.06); overflow: hidden; }
.hcard-head { padding: 12px 14px; display: flex; align-items: flex-start; justify-content: space-between; }
.hcard-date { font-size: 15px; font-weight: 600; }
.hcard-day { font-size: 13px; color: var(--g3); margin-top: 2px; }
.hcard-meta { display: flex; gap: 10px; flex-wrap: wrap; font-size: 12px; color: var(--g4); margin-top: 6px; }
.hcard-rpe { display: inline-block; background: var(--bll); color: var(--bl); font-size: 11px; padding: 2px 7px; border-radius: 20px; font-weight: 600; }
.hcard-body { border-top: 1px solid var(--g6); }
.hex-row { padding: 8px 14px; border-bottom: 1px solid var(--g6); font-size: 13px; }
.hex-row:last-child { border-bottom: none; }
.hex-name { font-weight: 500; }
.hex-sets { color: var(--g3); margin-top: 2px; font-size: 12px; }
.hcard-toggle { background: none; border: none; color: var(--bl); font-size: 13px; cursor: pointer; padding: 0; }

/* SETUP */
.setup-wrap { max-width: 400px; margin: 20px auto; }
.setup-title { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
.setup-sub { font-size: 14px; color: var(--g3); margin-bottom: 20px; line-height: 1.5; }
.field-lbl { font-size: 13px; font-weight: 500; margin-bottom: 6px; display: block; }
.field-in { width: 100%; height: 42px; border: 1px solid var(--g5); border-radius: 8px; padding: 0 12px; font-size: 15px; color: var(--g1); background: var(--wh); margin-bottom: 14px; }
.field-in:focus { outline: none; border-color: var(--bl); }
.field-hint { font-size: 12px; color: var(--g4); margin-top: -10px; margin-bottom: 14px; line-height: 1.4; }
.setup-step { background: var(--g6); border-radius: 8px; padding: 10px 12px; font-size: 13px; color: var(--g2); margin-bottom: 8px; line-height: 1.5; }
.setup-step strong { color: var(--g1); }

/* SYNC STATUS */
.sync-bar { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; margin-bottom: 8px; }
.sync-lbl { font-size: 12px; color: var(--g4); }
.sync-btn { font-size: 12px; color: var(--bl); background: none; border: none; cursor: pointer; }

/* MISC */
.sectitle { font-size: 12px; font-weight: 600; color: var(--g3); text-transform: uppercase; letter-spacing: .5px; margin: 12px 0 6px; }
.empty { text-align: center; padding: 40px 20px; color: var(--g4); font-size: 15px; }
.new-pill { font-size: 10px; background: #ede9fe; color: #7c3aed; padding: 1px 6px; border-radius: 10px; font-weight: 600; margin-left: 4px; display: inline-block; }
.startlist { background: var(--wh); border-radius: var(--ra); padding: 14px; margin-bottom: 10px; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
.startrow { display: flex; align-items: center; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--g6); }
.startrow:last-child { border-bottom: none; padding-bottom: 0; }
.startemi { font-size: 20px; width: 32px; text-align: center; flex-shrink: 0; }
.startname { font-size: 14px; font-weight: 500; }
.startmeta { font-size: 12px; color: var(--g3); }
.block-toggle { display: flex; background: var(--g6); border-radius: 10px; padding: 3px; margin-bottom: 12px; gap: 2px; }
.blkbtn { flex: 1; padding: 7px; border: none; border-radius: 8px; background: transparent; font-size: 13px; font-weight: 500; color: var(--g3); cursor: pointer; }
.blkbtn.on { background: var(--wh); color: var(--g1); box-shadow: 0 1px 3px rgba(0,0,0,.12); }
.stats-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
.stattile { background: var(--wh); border-radius: var(--ra); padding: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.06); text-align: center; }
.statlbl { font-size: 11px; color: var(--g3); margin-bottom: 4px; }
.statval { font-size: 22px; font-weight: 700; color: var(--g1); }
.error-bar { background: var(--rdl); color: var(--rd); border-radius: 8px; padding: 10px 14px; font-size: 13px; margin-bottom: 10px; }
</style>
</head>

  <button class="nt on" id="tab-week" data-tab="week">

</nav>

// ─── DATE UTILS ──────────────────────────────────────────────────────────────
function getWeekKey(d) {
  var dt = d || new Date();
  var day = dt.getDay();
  var mon = new Date(dt);
  mon.setDate(dt.getDate() - (day === 0 ? 6 : day - 1));
  return mon.toISOString().split('T')[0];
}
function getDayOfWeek() { return new Date().getDay(); } // 0=Sun
function isNewWeek() {
  if (!weekPlan) return true;
  return weekPlan.weekKey !== getWeekKey();
}
function getNextDayIdx() {
  if (!workoutLog.length) return 0;
  return (workoutLog[0].dayIdx + 1) % 3;
}
function formatDate(isoStr) {
  var d = new Date(isoStr + 'T12:00:00');
  return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}
function addDays(isoStr, n) {
  var d = new Date(isoStr + 'T12:00:00');
  d.setDate(d.getDate() + n);
  return d.toISOString().split('T')[0];
}
function today() { return new Date().toISOString().split('T')[0]; }

// ─── WEEK PLAN LOGIC ─────────────────────────────────────────────────────────
// Workout days: Tue=2, Thu=4, Sun=0 (D3 optional)
var DAY_SCHEDULE = [2, 4, 0]; // day-of-week for D1, D2, D3

function buildWeekPlan() {
  var wk = getWeekKey();
  var d = new Date(wk + 'T12:00:00'); // Monday of this week
  // Get dates for Tue, Thu, Sun of this week
  var tue = addDays(wk, 1);  // +1 from Monday = Tuesday
  var thu = addDays(wk, 3);  // +3 = Thursday
  var sun = addDays(wk, 6);  // +6 = Sunday

  var nextIdx = getNextDayIdx();
  var days = [];
  var dates = [tue, thu, sun];

  for (var i = 0; i < 3; i++) {
    var dIdx = (nextIdx + i) % 3;
    days.push({
      dayIdx: dIdx,
      date: dates[i],
      status: 'upcoming', // upcoming | done | skipped
      sessionId: null
    });
  }

  weekPlan = { weekKey: wk, days: days };
  saveWeekPlan();
}

function checkWeekReset() {
  if (isNewWeek()) buildWeekPlan();
}

// ─── GITHUB API ──────────────────────────────────────────────────────────────
var ghBase = 'https://api.github.com';

function ghHeaders() {
  return {
    'Authorization': 'token ' + cfg.pat,
    'Accept': 'application/vnd.github.v3+json',
    'Content-Type': 'application/json'
  };
}

function ghGetFile(cb) {
  var url = ghBase + '/repos/' + cfg.owner + '/' + cfg.dataRepo + '/contents/' + DATA_REPO_FILE;
  fetch(url, { headers: ghHeaders() })
    .then(function(r) {
      if (r.status === 404) { cb(null, null); return; } // file doesn't exist yet — not an error
      if (!r.ok) { cb(new Error('HTTP ' + r.status), null); return; }
      return r.json().then(function(data) { cb(null, data); });
    })
    .catch(function(e) { cb(e, null); });
}

function ghSaveLog(cb) {
  var content = btoa(unescape(encodeURIComponent(JSON.stringify(workoutLog, null, 2))));
  ghGetFile(function(err, existing) {
    var sha = existing && existing.sha ? existing.sha : undefined;
    var body = {
      message: 'Workout log update ' + today(),
      content: content
    };
    if (sha) body.sha = sha;
    var url = ghBase + '/repos/' + cfg.owner + '/' + cfg.dataRepo + '/contents/' + DATA_REPO_FILE;
    fetch(url, { method: 'PUT', headers: ghHeaders(), body: JSON.stringify(body) })
      .then(function(r) { return r.json(); })
      .then(function(data) { if (cb) cb(null, data); })
      .catch(function(e) { if (cb) cb(e, null); });
  });
}

function ghLoadLog(cb) {
  ghGetFile(function(err, data) {
    if (err) { cb(err, null); return; }
    if (!data || !data.content) { cb(null, []); return; } // empty repo = empty log, not an error
    try {
      var json = JSON.parse(decodeURIComponent(escape(atob(data.content.replace(/\n/g, '')))));
      cb(null, Array.isArray(json) ? json : []);
    } catch(e) { cb(e, null); }
  });
}

// ─── EVENT DELEGATION ────────────────────────────────────────────────────────
document.body.addEventListener('click', function(e) {
  var t = e.target;
  while (t && t !== document.body) {
    var a = t.getAttribute('data-a');
    if (a) { e.preventDefault(); dispatch(a, t); return; }
    t = t.parentElement;
  }
});

document.body.addEventListener('change', function(e) {
  var t = e.target;
  var inp = t.getAttribute('data-inp');
  if (!inp || !activeSession) return;
  var i = parseInt(t.getAttribute('data-i'));
  var s = parseInt(t.getAttribute('data-s'));
  if (inp === 'load' && activeSession.sets[i]) activeSession.sets[i][s].load = t.value;
  if (inp === 'reps' && activeSession.sets[i]) activeSession.sets[i][s].reps = t.value;
});

function dispatch(action, el) {
  var v = el.getAttribute('data-v');
  var i = el.getAttribute('data-i');
  if (action === 'tab') { switchTab(el.getAttribute('data-tab') || v); return; }
  if (action === 'blk') { cfg.block = parseInt(v); saveCfg(); renderQueue(); return; }
  if (action === 'setup-save') { doSetup(); return; }
  if (action === 'start-day') { startWorkout(parseInt(v)); return; }
  if (action === 'ex-done') { markExDone(parseInt(i)); return; }
  if (action === 'skip-rest') { stopRest(); return; }
  if (action === 'save-session') { saveSession(parseInt(v)); return; }
  if (action === 'back-review') { activeSession.finished = false; renderWorkout(); return; }
  if (action === 'rpe') { activeSession.rpe = parseInt(v); renderWorkout(); return; }
  if (action === 'set-chk') { toggleSetDone(parseInt(i), parseInt(el.getAttribute('data-s'))); return; }
  if (action === 'toggle-hex') { toggleHistoryEx(el); return; }
  if (action === 'sync-pull') { pullFromGitHub(); return; }
  if (action === 'export') { exportJSON(); return; }
  if (action === 'settings') { renderSetup(true); switchTab('settings'); return; }
}

  activeSession = {
    weekDayIdx: weekDayIdx,
    dayIdx: dayIdx,
    exIdx: 0,
    finished: false,
    rpe: null,
    startTime: Date.now(),
    restTimer: null,
    restSecs: 0,
    sets: {}

  day.exercises.forEach(function(ex, i) {
    var rows = [];

  rpeRow.appendChild(rpeBtns);
  rpeWrap.appendChild(rpeRow);
  sc.appendChild(rpeWrap);

  var saveBtn = mk('button', 'bigbtn grn');
  saveBtn.textContent = 'Save workout';
  saveBtn.setAttribute('data-a', 'save-session');
  saveBtn.setAttribute('data-v', activeSession.weekDayIdx);
  sc.appendChild(saveBtn);

  var backBtn = mk('button', 'bigbtn sec');
  backBtn.textContent = 'Back to review';
  backBtn.setAttribute('data-a', 'back-review');
  sc.appendChild(backBtn);

  sc.appendChild(mkT('div', 'saving-indicator', 'Session will be saved to GitHub when you tap Save.'));
}

function markExDone(i) {
  activeSession.completedEx.add(i);
  var day = DAYS[activeSession.dayIdx];
  if (i < day.exercises.length - 1) {
    activeSession.exIdx = i + 1;
    startRest(90);
  } else {
    activeSession.finished = true;
  }
  renderWorkout();
}

function toggleSetDone(i, s) {
  if (activeSession && activeSession.sets[i]) {
    activeSession.sets[i][s].done = !activeSession.sets[i][s].done;
    renderWorkout();
  }
}

function startRest(secs) {
  if (activeSession.restTimer) clearInterval(activeSession.restTimer);
  activeSession.restSecs = secs;
  activeSession.restTimer = setInterval(function() {
    activeSession.restSecs--;
    var el = document.getElementById('rest-display');
    if (el) el.textContent = fmtTime(activeSession.restSecs);
    if (activeSession.restSecs <= 0) stopRest();
  }, 1000);
}

function stopRest() {
  if (activeSession.restTimer) clearInterval(activeSession.restTimer);
  activeSession.restTimer = null;
  renderWorkout();
}

function fmtTime(s) { return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0'); }

function saveSession(weekDayIdx) {
  var day = DAYS[activeSession.dayIdx];
  var dur = Math.round((Date.now() - activeSession.startTime) / 60000);
  var sessionId = Date.now();

  // Build exercise log
  var exercises = [];
  day.exercises.forEach(function(ex, i) {
    var sets = (activeSession.sets[i] || []).filter(function(s) { return s.load || s.reps; });
    exercises.push({
      id: ex.id,
      name: ex.name,
      completed: activeSession.completedEx.has(i),
      sets: sets
    });
  });

  var entry = {
    id: sessionId,
    date: today(),
    dayIdx: activeSession.dayIdx,
    dayName: day.name,
    block: cfg.block || 1,
    duration: dur,
    rpe: activeSession.rpe,
    exercises: exercises
  };

  workoutLog.unshift(entry);
  saveLog();

  // Mark week plan
  weekPlan.days[weekDayIdx].status = 'done';
  weekPlan.days[weekDayIdx].sessionId = sessionId;
  saveWeekPlan();

  // Clear active session
  if (activeSession.restTimer) clearInterval(activeSession.restTimer);
  activeSession = null;

  // Save to GitHub
  var sc = document.getElementById('sc-workout');
  sc.innerHTML = '';
  var ind = mkT('div', 'saving-indicator', 'Saving to GitHub...');
  sc.appendChild(ind);

  ghSaveLog(function(err) {
    if (err) {
      var eb = mkT('div', 'error-bar', 'GitHub save failed. Data is saved locally and will sync next time.');
      sc.appendChild(eb);
    } else {
      cfg.lastSync = today();
      saveCfg();
    }
    switchTab('week');
  });
}

// ─── HISTORY SCREEN ───────────────────────────────────────────────────────────
function renderHistory() {
  var sc = document.getElementById('sc-history');
  sc.innerHTML = '';

  if (!workoutLog.length) {
    sc.appendChild(mkT('div', 'empty', 'No sessions yet. Complete a workout to see history here.'));
    return;
  }

  sc.appendChild(mkT('div', 'sectitle', workoutLog.length + ' sessions'));

  workoutLog.forEach(function(session) {
    var card = mk('div', 'hcard');

    var head = mk('div', 'hcard-head');
    var left = mk('div');
    left.appendChild(mkT('div', 'hcard-date', formatDate(session.date)));
    left.appendChild(mkT('div', 'hcard-day', session.dayName + ' · Block ' + (session.block || 1)));
    var meta = mk('div', 'hcard-meta');
    if (session.duration) meta.appendChild(mkT('span', '', '⏱ ' + session.duration + ' min'));
    if (session.rpe) meta.appendChild(mkT('span', 'hcard-rpe', 'RPE ' + session.rpe));
    var compCount = (session.exercises || []).filter(function(e) { return e.completed; }).length;
    meta.appendChild(mkT('span', '', '✓ ' + compCount + '/' + (session.exercises || []).length));
    left.appendChild(meta);
    head.appendChild(left);

    var tog = mk('button', 'hcard-toggle');
    tog.textContent = 'Details';
    tog.setAttribute('data-a', 'toggle-hex');
    tog.setAttribute('data-id', session.id);
    head.appendChild(tog);
    card.appendChild(head);

    // Exercise detail (collapsed by default)
    var body = mk('div', 'hcard-body');
    body.id = 'hex-' + session.id;
    body.style.display = 'none';
    (session.exercises || []).forEach(function(ex) {
      if (!ex.completed && !ex.sets.length) return;
      var row = mk('div', 'hex-row');
      row.appendChild(mkT('div', 'hex-name', ex.name));
      if (ex.sets && ex.sets.length) {
        var setStr = ex.sets.map(function(s, i) {
          return 'Set ' + (i + 1) + ': ' + (s.load ? s.load + 'lb' : '') + (s.load && s.reps ? ' × ' : '') + (s.reps || '');
        }).join(' · ');
        row.appendChild(mkT('div', 'hex-sets', setStr));
      }
      body.appendChild(row);
    });
    card.appendChild(body);
    sc.appendChild(card);
  });
}

function toggleHistoryEx(el) {
  var id = el.getAttribute('data-id');
  var body = document.getElementById('hex-' + id);
  if (!body) return;
  var isOpen = body.style.display !== 'none';
  body.style.display = isOpen ? 'none' : 'block';
  el.textContent = isOpen ? 'Details' : 'Hide';
}

// ─── QUEUE SCREEN ─────────────────────────────────────────────────────────────
function renderQueue() {
  var sc = document.getElementById('sc-queue');
  sc.innerHTML = '';

  // Block toggle
  var btog = mk('div', 'block-toggle');
  [1, 2].forEach(function(n) {
    var btn = mk('button', 'blkbtn' + ((cfg.block || 1) === n ? ' on' : ''));
    btn.textContent = n === 1 ? 'Block 1 — Jun/Jul' : 'Block 2 — Aug/Sep';
    btn.setAttribute('data-a', 'blk'); btn.setAttribute('data-v', n);
    btog.appendChild(btn);
  });
  sc.appendChild(btog);

  sc.appendChild(mkT('div', 'sectitle', 'Upcoming rotation'));

  var ni = getNextDayIdx();
  var colors = ['background:#e8f0fe;color:#1a73e8', 'background:#e6f4ea;color:#1e8e3e', 'background:#fef3e2;color:#e37400'];
  [0, 1, 2, 3, 4].forEach(function(i) {
    var idx = (ni + i) % 3;
    var day = DAYS[idx];
    var qc = mk('div', 'card card-pad');
    qc.style.display = 'flex'; qc.style.alignItems = 'center'; qc.style.gap = '12px';
    var qn = mk('div');
    qn.style.cssText = 'width:28px;height:28px;border-radius:50%;' + colors[idx] + ';font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;';
    qn.textContent = '' + (i + 1);
    var qi = mk('div'); qi.style.flex = '1';
    qi.appendChild(mkT('div', '', (i === 0 ? '▶ ' : '') + day.short));
    qi.appendChild(mkT('div', 'sync-lbl', day.exercises.length + ' exercises · ' + day.badge));
    qc.appendChild(qn); qc.appendChild(qi);
    sc.appendChild(qc);
  });
}

// ─── GITHUB SYNC ──────────────────────────────────────────────────────────────
function pullFromGitHub() {
  if (!isConfigured()) { alert('Set up GitHub in Settings first.'); return; }
  ghLoadLog(function(err, data) {
    if (err) {
      alert('GitHub error: ' + (err.message || err) + '\n\nCheck: correct username, repo name, and PAT has "repo" scope.');
      return;
    }
    if (!data) { alert('No data returned from GitHub.'); return; }
    var remoteIds = new Set(data.map(function(e) { return e.id; }));
    var localOnly = workoutLog.filter(function(e) { return !remoteIds.has(e.id); });
    workoutLog = data.concat(localOnly).sort(function(a, b) { return b.id - a.id; });
    saveLog();
    cfg.lastSync = today();
    saveCfg();
    renderWeek();
    alert('Synced. ' + workoutLog.length + ' sessions total.' + (data.length === 0 ? '\n\n(No sessions in GitHub yet — this is expected on first use.)' : ''));
  });
}

function exportJSON() {
  var json = JSON.stringify(workoutLog, null, 2);
  var blob = new Blob([json], { type: 'application/json' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'workout-log.json';
  a.click();
  URL.revokeObjectURL(url);
}

// ─── DOM HELPERS ─────────────────────────────────────────────────────────────
function mk(tag, cls) { var el = document.createElement(tag); if (cls) el.className = cls; return el; }
function mkT(tag, cls, txt) { var el = mk(tag, cls); el.textContent = txt; return el; }

// ─── WAKE LOCK ────────────────────────────────────────────────────────────────
function requestWakeLock() {
  try {
    if ('wakeLock' in navigator) {
      navigator.wakeLock.request('screen').catch(function() {});
    }
  } catch(e) {}
}
requestWakeLock();
document.addEventListener('visibilitychange', function() {
  if (document.visibilityState === 'visible') requestWakeLock();
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
if (!isConfigured()) {
  renderSetup(false);
  document.querySelectorAll('.sc').forEach(function(s) { s.classList.remove('on'); });
  document.querySelectorAll('.nt').forEach(function(t) { t.classList.remove('on'); });
  document.getElementById('sc-queue').classList.add('on');
  document.getElementById('tab-queue').classList.add('on');
} else {
  checkWeekReset();
  renderWeek();
}
</script>
